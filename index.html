<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Thirds Rule Camera</title>
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thirds Cam">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --accent: #2f81f7; --good: #3fb950;
    --warn: #d29922; --text: #e6edf3; --dim: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 12px; padding-top: calc(12px + env(safe-area-inset-top)); gap: 10px;
  }
  h1 { font-size: 1.1rem; font-weight: 600; }
  h1 span { color: var(--accent); }
  #stage {
    position: relative; width: min(960px, 100%);
    border-radius: 12px; overflow: hidden; background: #000;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  video { width: 100%; display: block; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #flash {
    position: absolute; inset: 0; background: #fff; opacity: 0;
    pointer-events: none; transition: opacity .35s ease;
  }
  #status {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border-radius: 10px; padding: 10px 14px;
    width: min(960px, 100%); font-size: .9rem;
  }
  #statusDot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button {
    background: var(--panel); color: var(--text); border: 1px solid #30363d;
    padding: 10px 16px; border-radius: 8px; font-size: .9rem; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button.small { padding: 5px 10px; font-size: .78rem; border-radius: 6px; }
  #gallery {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    width: min(960px, 100%); padding-bottom: 20px;
  }
  #gallery figure {
    background: var(--panel); border-radius: 8px; padding: 6px;
    display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  #gallery img { width: 160px; border-radius: 6px; display: block; }
  #gallery .row { display: flex; gap: 6px; }
  #countdown {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 5rem; font-weight: 700; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,.8);
    pointer-events: none; opacity: 0;
  }
  #installBtn { display: none; }
</style>
</head>
<body>
<h1>📷 Thirds Rule Camera <span>· AI auto-capture</span></h1>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="countdown"></div>
  <div id="flash"></div>
</div>

<div id="status"><div id="statusDot"></div><div id="statusText">Loading AI model…</div></div>

<div class="controls">
  <button id="autoBtn" class="primary">Auto-capture: ON</button>
  <button id="shutterBtn">Manual shutter</button>
  <button id="flipBtn">Flip camera</button>
  <button id="installBtn">⬇ Install app</button>
</div>

<div id="gallery"></div>

<script>
(async () => {
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const flash = document.getElementById('flash');
  const countdownEl = document.getElementById('countdown');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const gallery = document.getElementById('gallery');
  const autoBtn = document.getElementById('autoBtn');
  const shutterBtn = document.getElementById('shutterBtn');
  const flipBtn = document.getElementById('flipBtn');
  const installBtn = document.getElementById('installBtn');

  // --- Tunables ---
  const ALIGN_RADIUS = 0.07;
  const STABLE_FRAMES = 12;
  const COOLDOWN_MS = 4000;
  const MIN_SCORE = 0.45;
  const COUNTDOWN_FROM = 2;

  let autoCapture = true;
  let facingMode = 'environment';
  let model = null;
  let stream = null;
  let stableCount = 0;
  let lastCapture = 0;
  let countingDown = false;
  let lastSubject = null; // {cx, cy, t} updated each frame a subject is seen

  // ---------- PWA install ----------
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'inline-block';
  });
  installBtn.onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  };

  // ---------- Photo storage (IndexedDB) ----------
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('thirds-cam', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('photos', { keyPath: 'id' });
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function dbPut(photo) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').put(photo);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
  async function dbAll() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos').objectStore('photos').getAll();
      req.onsuccess = () => res(req.result.sort((a, b) => b.id - a.id));
      req.onerror = () => rej(req.error);
    });
  }
  async function dbDelete(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').delete(id);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }

  function addToGallery(photo) {
    const fig = document.createElement('figure');
    const img = document.createElement('img');
    img.src = URL.createObjectURL(photo.blob);
    const row = document.createElement('div');
    row.className = 'row';

    const name = `thirds-${photo.id}.jpg`;

    // Save to phone: Web Share (→ Save Image / Photos) when available
    let canShareFiles = false;
    try {
      canShareFiles = navigator.canShare && navigator.canShare({ files: [new File([photo.blob], name, { type: 'image/jpeg' })] });
    } catch (e) {}
    if (canShareFiles) {
      const shareBtn = document.createElement('button');
      shareBtn.className = 'small'; shareBtn.textContent = '💾 Save';
      shareBtn.onclick = () => navigator.share({
        files: [new File([photo.blob], name, { type: 'image/jpeg' })]
      }).catch(() => {});
      row.append(shareBtn);
    }

    const dlBtn = document.createElement('button');
    dlBtn.className = 'small'; dlBtn.textContent = '⬇';
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = img.src; a.download = name; a.click();
    };
    const delBtn = document.createElement('button');
    delBtn.className = 'small'; delBtn.textContent = '🗑';
    delBtn.onclick = async () => { await dbDelete(photo.id); fig.remove(); };

    row.append(dlBtn, delBtn);
    fig.append(img, row);
    gallery.prepend(fig);
  }

  // ---------- Camera ----------
  function setStatus(text, color) {
    statusText.textContent = text;
    statusDot.style.background = color || 'var(--dim)';
  }

  function syncOverlay() {
    if (video.videoWidth && (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight)) {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
    }
  }

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1920 } },
        audio: false
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      await video.play().catch(() => {});
      syncOverlay();
    } catch (e) {
      setStatus('Camera unavailable: ' + e.message, '#f85149');
      throw e;
    }
  }
  // Re-sync when the phone rotates or the stream changes shape
  window.addEventListener('resize', () => setTimeout(syncOverlay, 300));
  window.addEventListener('orientationchange', () => setTimeout(syncOverlay, 500));
  video.addEventListener('resize', syncOverlay);

  function powerPoints(w, h) {
    return [
      { x: w / 3, y: h / 3 }, { x: 2 * w / 3, y: h / 3 },
      { x: w / 3, y: 2 * h / 3 }, { x: 2 * w / 3, y: 2 * h / 3 }
    ];
  }

  function drawGrid(w, h) {
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 8]);
    [w / 3, 2 * w / 3].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); });
    [h / 3, 2 * h / 3].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); });
    ctx.setLineDash([]);
    powerPoints(w, h).forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    });
  }

  function pickSubject(predictions) {
    let best = null, bestVal = 0;
    for (const p of predictions) {
      if (p.score < MIN_SCORE) continue;
      const val = p.bbox[2] * p.bbox[3] * p.score;
      if (val > bestVal) { bestVal = val; best = p; }
    }
    return best;
  }

  function doFlash() {
    flash.style.opacity = '0.9';
    setTimeout(() => flash.style.opacity = '0', 120);
  }

  // Crop the frame so the subject lands EXACTLY on a thirds power point
  function composeThirds(src, cx, cy) {
    const W = src.width, H = src.height;
    const z = 1.25;                       // zoom-in factor for recomposition room
    const cw = Math.round(W / z), ch = Math.round(H / z);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    let best = null;
    for (const [fx, fy] of [[1/3, 1/3], [2/3, 1/3], [1/3, 2/3], [2/3, 2/3]]) {
      const x0 = clamp(cx - fx * cw, 0, W - cw);
      const y0 = clamp(cy - fy * ch, 0, H - ch);
      const score = Math.hypot((cx - x0) / cw - fx, (cy - y0) / ch - fy);
      if (!best || score < best.score) best = { x0, y0, score };
    }
    const out = document.createElement('canvas');
    out.width = cw; out.height = ch;
    out.getContext('2d').drawImage(src, best.x0, best.y0, cw, ch, 0, 0, cw, ch);
    return out;
  }

  async function capture(label) {
    let c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    // Recompose so the subject sits precisely on a thirds intersection
    if (lastSubject && Date.now() - lastSubject.t < 1200) {
      c = composeThirds(c, lastSubject.cx, lastSubject.cy);
    }
    doFlash();
    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
    const photo = { id: Date.now(), blob, label: label || '' };
    try { await dbPut(photo); } catch (e) { console.warn('save failed', e); }
    addToGallery(photo);
    lastCapture = Date.now();
    stableCount = 0;
  }

  async function runCountdownAndCapture(label) {
    countingDown = true;
    for (let n = COUNTDOWN_FROM; n >= 1; n--) {
      countdownEl.textContent = n;
      countdownEl.style.opacity = '1';
      await new Promise(r => setTimeout(r, 500));
    }
    countdownEl.style.opacity = '0';
    await capture(label);
    countingDown = false;
  }

  function guidance(dx, dy) {
    const dirs = [];
    if (Math.abs(dx) > 4) dirs.push(dx > 0 ? '→ right' : '← left');
    if (Math.abs(dy) > 4) dirs.push(dy > 0 ? '↓ down' : '↑ up');
    return dirs.length ? 'Move subject ' + dirs.join(' and ') : 'Hold still…';
  }

  async function loop() {
    if (video.readyState >= 2 && model && video.videoWidth) {
      syncOverlay();
      const w = overlay.width, h = overlay.height;
      ctx.clearRect(0, 0, w, h);
      drawGrid(w, h);

      let predictions = [];
      try { predictions = await model.detect(video); } catch (e) {}
      const subject = pickSubject(predictions);

      if (subject) {
        const [bx, by, bw, bh] = subject.bbox;
        const cx = bx + bw / 2, cy = by + bh / 2;
        lastSubject = { cx, cy, t: Date.now() };

        const pts = powerPoints(w, h);
        let nearest = pts[0], nd = Infinity;
        for (const p of pts) {
          const d = Math.hypot(cx - p.x, cy - p.y);
          if (d < nd) { nd = d; nearest = p; }
        }
        const threshold = ALIGN_RADIUS * Math.hypot(w, h);
        const aligned = nd <= threshold;

        ctx.strokeStyle = aligned ? '#3fb950' : '#2f81f7';
        ctx.lineWidth = 3;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
        ctx.font = `${Math.max(14, w / 50)}px sans-serif`;
        ctx.fillText(`${subject.class} ${(subject.score * 100).toFixed(0)}%`, bx + 4, Math.max(16, by - 8));

        ctx.setLineDash([4, 6]);
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nearest.x, nearest.y); ctx.stroke();
        ctx.setLineDash([]);

        ctx.beginPath(); ctx.arc(nearest.x, nearest.y, 14, 0, Math.PI * 2);
        ctx.strokeStyle = aligned ? '#3fb950' : '#d29922';
        ctx.lineWidth = 3; ctx.stroke();

        const coolingDown = Date.now() - lastCapture < COOLDOWN_MS;

        if (aligned) {
          stableCount++;
          if (coolingDown) {
            setStatus(`${subject.class} aligned — cooling down`, '#d29922');
          } else if (autoCapture && !countingDown && stableCount >= STABLE_FRAMES) {
            setStatus(`Capturing ${subject.class}!`, '#3fb950');
            runCountdownAndCapture(subject.class);
          } else {
            setStatus(`${subject.class} on power point — hold still (${Math.min(stableCount, STABLE_FRAMES)}/${STABLE_FRAMES})`, '#3fb950');
          }
        } else {
          stableCount = 0;
          setStatus(`${subject.class} detected — ${guidance(nearest.x - cx, nearest.y - cy)}`, '#2f81f7');
        }
      } else {
        stableCount = 0;
        setStatus('Looking for a subject…', 'var(--dim)');
      }
    }
    requestAnimationFrame(loop);
  }

  // --- Controls ---
  autoBtn.onclick = () => {
    autoCapture = !autoCapture;
    autoBtn.textContent = `Auto-capture: ${autoCapture ? 'ON' : 'OFF'}`;
    autoBtn.classList.toggle('primary', autoCapture);
  };
  shutterBtn.onclick = () => capture('manual');
  flipBtn.onclick = async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  };

  // --- Boot ---
  try {
    (await dbAll()).forEach(addToGallery);
  } catch (e) {}
  try {
    setStatus('Requesting camera…');
    await startCamera();
    setStatus('Loading AI model (first load may take a few seconds)…');
    model = await cocoSsd.load();
    setStatus('Ready — point at a subject', '#3fb950');
    loop();
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
