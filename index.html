<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Thirds Rule Camera</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thirds Cam">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  #stage { position: fixed; inset: 0; background: #000; }
  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none;
    transition: opacity .35s ease; }
  #countdown { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 6rem; font-weight: 700; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,.8);
    pointer-events: none; opacity: 0; }

  /* Top bar */
  #topbar { position: absolute; left: 0; right: 0; top: 0;
    padding: calc(8px + env(safe-area-inset-top)) 10px 8px;
    display: flex; align-items: center; gap: 8px; z-index: 5; }
  #status { flex: 1; display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
    border-radius: 999px; padding: 7px 12px; color: #fff; font-size: .8rem; min-width: 0; }
  #statusText { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #statusDot { width: 9px; height: 9px; border-radius: 50%; background: #8b949e; flex-shrink: 0; }
  .chip { background: rgba(0,0,0,.55); backdrop-filter: blur(6px); color: #fff;
    border: none; border-radius: 999px; padding: 7px 11px; font-size: .8rem; }
  #installBtn { display: none; }
  #lensSel { max-width: 105px; -webkit-appearance: none; appearance: none; }

  /* Zoom */
  #zoomWrap { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    z-index: 5; display: none; flex-direction: column; align-items: center; gap: 6px;
    background: rgba(0,0,0,.45); border-radius: 999px; padding: 12px 8px; }
  #zoomWrap label { color: #fff; font-size: .7rem; }
  #zoom { writing-mode: vertical-lr; direction: rtl; height: 130px; width: 24px; }

  /* Bottom controls */
  #controls { position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    padding: 10px 18px calc(14px + env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(transparent, rgba(0,0,0,.55)); }
  .side { width: 74px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #autoBtn { border: none; border-radius: 999px; padding: 8px 12px; font-size: .75rem;
    font-weight: 700; color: #fff; background: #3fb950; }
  #autoBtn.off { background: rgba(255,255,255,.22); }
  #flipBtn { border: none; background: rgba(255,255,255,.22); color: #fff;
    width: 46px; height: 46px; border-radius: 50%; font-size: 1.3rem; }
  #shutter { width: 74px; height: 74px; border-radius: 50%; border: 5px solid #fff;
    background: rgba(255,255,255,.25); }
  #shutter:active { background: #fff; }
  #galThumb { width: 46px; height: 46px; border-radius: 10px; border: 2px solid rgba(255,255,255,.6);
    background: rgba(255,255,255,.12) center/cover no-repeat; padding: 0; }

  /* Sheets (gallery + settings) */
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; top: 22%;
    background: #14181f; border-radius: 18px 18px 0 0; z-index: 10;
    transform: translateY(105%); transition: transform .25s ease;
    display: flex; flex-direction: column; }
  .sheet.open { transform: translateY(0); }
  .sheetHead { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; color: #e6edf3; font-weight: 600; }
  .closeBtn { background: rgba(255,255,255,.15); color: #fff; border: none;
    border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; }
  #gallery { overflow-y: auto; display: grid; gap: 10px;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom));
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  #gallery figure { background: #1d232c; border-radius: 10px; padding: 6px;
    display: flex; flex-direction: column; gap: 6px; }
  #gallery img { width: 100%; border-radius: 8px; display: block; }
  #gallery .row { display: flex; gap: 6px; justify-content: center; }
  #gallery .row button { background: rgba(255,255,255,.12); color: #fff; border: none;
    border-radius: 7px; padding: 6px 10px; font-size: .8rem; }

  /* Settings */
  #settingsBody { overflow-y: auto; padding: 0 16px calc(20px + env(safe-area-inset-bottom));
    color: #e6edf3; display: flex; flex-direction: column; gap: 16px; }
  .setRow { display: flex; align-items: center; justify-content: space-between;
    background: #1d232c; border-radius: 10px; padding: 13px 14px; font-size: .92rem; }
  .setRow select { background: #2a323d; color: #fff; border: none; border-radius: 7px;
    padding: 6px 10px; font-size: .9rem; }
  .switch { position: relative; width: 48px; height: 28px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #3a424d; border-radius: 999px;
    transition: .2s; cursor: pointer; }
  .slider:before { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: #3fb950; }
  .switch input:checked + .slider:before { transform: translateX(20px); }

  /* Review overlay */
  #review { position: absolute; inset: 0; background: #000; z-index: 20;
    display: none; flex-direction: column; }
  #review.open { display: flex; }
  #reviewImg { flex: 1; object-fit: contain; width: 100%; min-height: 0; }
  #reviewBtns { display: flex; gap: 14px; justify-content: center;
    padding: 14px 20px calc(20px + env(safe-area-inset-bottom)); }
  #reviewBtns button { flex: 1; max-width: 220px; padding: 15px; border: none;
    border-radius: 12px; font-size: 1.05rem; font-weight: 700; color: #fff; }
  #keepBtn { background: #3fb950; }
  #discardBtn { background: rgba(255,255,255,.18); }

  /* Intro walkthrough */
  #intro { position: absolute; inset: 0; z-index: 30; background: rgba(0,0,0,.88);
    display: none; align-items: center; justify-content: center; padding: 26px; }
  #intro.open { display: flex; }
  #introCard { background: #14181f; border-radius: 18px; padding: 28px 22px; max-width: 340px;
    width: 100%; text-align: center; color: #e6edf3; }
  #introCard .big { font-size: 3rem; margin-bottom: 12px; }
  #introCard h2 { font-size: 1.15rem; margin-bottom: 8px; }
  #introCard p { font-size: .92rem; color: #9aa4b2; line-height: 1.45; min-height: 60px; }
  #introDots { display: flex; gap: 7px; justify-content: center; margin: 16px 0; }
  #introDots span { width: 8px; height: 8px; border-radius: 50%; background: #3a424d; }
  #introDots span.on { background: #2f81f7; }
  #introNext { width: 100%; padding: 14px; border: none; border-radius: 11px;
    background: #2f81f7; color: #fff; font-size: 1rem; font-weight: 700; }
</style>
</head>
<body>
<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="countdown"></div>
  <div id="flash"></div>

  <div id="topbar">
    <div id="status"><div id="statusDot"></div><div id="statusText">Loading…</div></div>
    <select id="lensSel" class="chip"></select>
    <button id="settingsBtn" class="chip">⚙</button>
    <button id="installBtn" class="chip">⬇ Install</button>
  </div>

  <div id="zoomWrap">
    <label id="zoomVal">1x</label>
    <input id="zoom" type="range" min="1" max="1" step="0.1" value="1">
  </div>

  <div id="controls">
    <div class="side">
      <button id="autoBtn">AUTO ON</button>
      <button id="galThumb" title="Gallery"></button>
    </div>
    <button id="shutter" title="Take photo"></button>
    <div class="side">
      <button id="flipBtn" title="Flip camera">🔄</button>
    </div>
  </div>

  <div id="gallerySheet" class="sheet">
    <div class="sheetHead"><span>Photos</span><button class="closeBtn" data-close="gallerySheet">✕</button></div>
    <div id="gallery"></div>
  </div>

  <div id="settingsSheet" class="sheet">
    <div class="sheetHead"><span>Settings</span><button class="closeBtn" data-close="settingsSheet">✕</button></div>
    <div id="settingsBody">
      <div class="setRow"><span>Countdown before snap</span>
        <select id="setCountdown"><option value="0">Off</option><option value="2">2s</option><option value="3">3s</option><option value="5">5s</option></select></div>
      <div class="setRow"><span>Pause between shots</span>
        <select id="setCooldown"><option value="2">2s</option><option value="4">4s</option><option value="6">6s</option><option value="10">10s</option></select></div>
      <div class="setRow"><span>Shutter sound</span>
        <label class="switch"><input type="checkbox" id="setSound"><span class="slider"></span></label></div>
      <div class="setRow"><span>Vibration</span>
        <label class="switch"><input type="checkbox" id="setHaptics"><span class="slider"></span></label></div>
      <div class="setRow"><span>Thirds grid</span>
        <label class="switch"><input type="checkbox" id="setGrid"><span class="slider"></span></label></div>
      <div class="setRow"><span>Review before saving</span>
        <label class="switch"><input type="checkbox" id="setReview"><span class="slider"></span></label></div>
      <div class="setRow"><span>Replay tutorial</span>
        <button class="chip" id="replayIntro" style="background:#2a323d">Show</button></div>
    </div>
  </div>

  <div id="review">
    <img id="reviewImg" alt="Captured photo">
    <div id="reviewBtns">
      <button id="discardBtn">✕ Discard</button>
      <button id="keepBtn">✓ Keep</button>
    </div>
  </div>

  <div id="intro">
    <div id="introCard">
      <div class="big" id="introIcon">📷</div>
      <h2 id="introTitle"></h2>
      <p id="introText"></p>
      <div id="introDots"></div>
      <button id="introNext">Next</button>
    </div>
  </div>
</div>

<script>
(async () => {
  const $ = id => document.getElementById(id);
  const video = $('video'), overlay = $('overlay'), ctx = overlay.getContext('2d');
  const stage = $('stage'), flash = $('flash'), countdownEl = $('countdown');
  const statusDot = $('statusDot'), statusText = $('statusText');
  const gallery = $('gallery'), galThumb = $('galThumb');
  const autoBtn = $('autoBtn'), shutterBtn = $('shutter'), flipBtn = $('flipBtn');
  const installBtn = $('installBtn'), lensSel = $('lensSel');
  const zoomWrap = $('zoomWrap'), zoomSlider = $('zoom'), zoomVal = $('zoomVal');

  // ---------- Settings ----------
  const DEFAULTS = { countdown: 2, cooldown: 4, sound: true, haptics: true, grid: true, review: true };
  let settings = { ...DEFAULTS };
  try { settings = { ...DEFAULTS, ...JSON.parse(localStorage.getItem('tc-settings') || '{}') }; } catch (e) {}
  const saveSettings = () => { try { localStorage.setItem('tc-settings', JSON.stringify(settings)); } catch (e) {} };

  $('setCountdown').value = String(settings.countdown);
  $('setCooldown').value = String(settings.cooldown);
  $('setSound').checked = settings.sound;
  $('setHaptics').checked = settings.haptics;
  $('setGrid').checked = settings.grid;
  $('setReview').checked = settings.review;
  $('setCountdown').onchange = e => { settings.countdown = +e.target.value; saveSettings(); };
  $('setCooldown').onchange = e => { settings.cooldown = +e.target.value; saveSettings(); };
  $('setSound').onchange = e => { settings.sound = e.target.checked; saveSettings(); };
  $('setHaptics').onchange = e => { settings.haptics = e.target.checked; saveSettings(); };
  $('setGrid').onchange = e => { settings.grid = e.target.checked; saveSettings(); };
  $('setReview').onchange = e => { settings.review = e.target.checked; saveSettings(); };

  document.querySelectorAll('.closeBtn').forEach(b => b.onclick = () => $(b.dataset.close).classList.remove('open'));
  $('settingsBtn').onclick = () => $('settingsSheet').classList.add('open');
  galThumb.onclick = () => $('gallerySheet').classList.add('open');

  // ---------- Sound & haptics ----------
  let audioCtx = null;
  document.addEventListener('pointerdown', () => {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { passive: true });
  function beep(freq, dur, vol = 0.15) {
    if (!settings.sound || !audioCtx) return;
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.value = freq; o.type = 'square';
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (e) {}
  }
  const shutterSound = () => { beep(1100, 0.05, 0.2); setTimeout(() => beep(700, 0.07, 0.2), 60); };
  const lockSound = () => beep(880, 0.08, 0.12);
  const buzz = ms => { if (settings.haptics && navigator.vibrate) navigator.vibrate(ms); };

  // ---------- Tunables ----------
  const ALIGN_RADIUS = 0.07;
  const STABLE_FRAMES = 12;
  const MIN_SCORE = 0.45;

  let autoCapture = true;
  let facingMode = 'environment';
  let currentDeviceId = null;
  let model = null, stream = null, track = null;
  let stableCount = 0, lastCapture = 0, countingDown = false;
  let lastSubject = null;      // {cxImg, cyImg, t}
  let view = null;
  let lastPreds = [];
  let wasAligned = false;
  let reviewing = false;
  // Tap-to-select
  let sel = null;              // {class, bbox, lastSeen}

  // ---------- PWA ----------
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'inline-block';
  });
  installBtn.onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice;
    deferredPrompt = null; installBtn.style.display = 'none';
  };

  // ---------- Walkthrough ----------
  const INTRO = [
    { icon: '🎯', title: 'Point at your subject', text: 'The AI finds people, pets, and objects automatically — or tap anything on screen to choose it yourself.' },
    { icon: '🧭', title: 'Follow the arrow', text: 'A glowing arrow guides you to a rule-of-thirds "power point." When you lock on, a ring fills up — hold steady.' },
    { icon: '📸', title: 'It snaps for you', text: 'The photo is auto-composed on the thirds grid. Review it, keep or discard, and save favorites to your phone.' }
  ];
  let introStep = 0;
  function showIntro() {
    introStep = 0; renderIntro(); $('intro').classList.add('open');
  }
  function renderIntro() {
    const s = INTRO[introStep];
    $('introIcon').textContent = s.icon;
    $('introTitle').textContent = s.title;
    $('introText').textContent = s.text;
    $('introDots').innerHTML = INTRO.map((_, i) => `<span class="${i === introStep ? 'on' : ''}"></span>`).join('');
    $('introNext').textContent = introStep === INTRO.length - 1 ? "Let's go!" : 'Next';
  }
  $('introNext').onclick = () => {
    if (introStep < INTRO.length - 1) { introStep++; renderIntro(); }
    else { $('intro').classList.remove('open'); try { localStorage.setItem('tc-intro', '1'); } catch (e) {} }
  };
  $('replayIntro').onclick = () => { $('settingsSheet').classList.remove('open'); showIntro(); };
  let introSeen = false;
  try { introSeen = !!localStorage.getItem('tc-intro'); } catch (e) {}
  if (!introSeen) showIntro();

  // ---------- IndexedDB ----------
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('thirds-cam', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('photos', { keyPath: 'id' });
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  const dbPut = async p => { const db = await openDB(); return new Promise((res, rej) => {
    const tx = db.transaction('photos', 'readwrite'); tx.objectStore('photos').put(p);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); };
  const dbAll = async () => { const db = await openDB(); return new Promise((res, rej) => {
    const rq = db.transaction('photos').objectStore('photos').getAll();
    rq.onsuccess = () => res(rq.result.sort((a, b) => b.id - a.id));
    rq.onerror = () => rej(rq.error); }); };
  const dbDelete = async id => { const db = await openDB(); return new Promise((res, rej) => {
    const tx = db.transaction('photos', 'readwrite'); tx.objectStore('photos').delete(id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); };

  function addToGallery(photo, prepend = true) {
    const fig = document.createElement('figure');
    const img = document.createElement('img');
    const url = URL.createObjectURL(photo.blob);
    img.src = url;
    const row = document.createElement('div'); row.className = 'row';
    const name = `thirds-${photo.id}.jpg`;
    let shareable = false;
    try { shareable = navigator.canShare &&
      navigator.canShare({ files: [new File([photo.blob], name, { type: 'image/jpeg' })] }); } catch (e) {}
    if (shareable) {
      const b = document.createElement('button'); b.textContent = '💾 Save';
      b.onclick = () => navigator.share({ files: [new File([photo.blob], name, { type: 'image/jpeg' })] }).catch(() => {});
      row.append(b);
    }
    const dl = document.createElement('button'); dl.textContent = '⬇';
    dl.onclick = () => { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); };
    const del = document.createElement('button'); del.textContent = '🗑';
    del.onclick = async () => { await dbDelete(photo.id); fig.remove(); };
    row.append(dl, del);
    fig.append(img, row);
    prepend ? gallery.prepend(fig) : gallery.append(fig);
    if (prepend) galThumb.style.backgroundImage = `url(${url})`;
  }

  // ---------- Review ----------
  let pendingPhoto = null, pendingUrl = null;
  function openReview(photo) {
    pendingPhoto = photo;
    pendingUrl = URL.createObjectURL(photo.blob);
    $('reviewImg').src = pendingUrl;
    $('review').classList.add('open');
    reviewing = true;
  }
  async function closeReview(keep) {
    $('review').classList.remove('open');
    reviewing = false;
    if (pendingUrl) URL.revokeObjectURL(pendingUrl);
    if (keep && pendingPhoto) {
      try { await dbPut(pendingPhoto); } catch (e) {}
      addToGallery(pendingPhoto);
      buzz(30);
    }
    pendingPhoto = null; pendingUrl = null;
    lastCapture = Date.now();
  }
  $('keepBtn').onclick = () => closeReview(true);
  $('discardBtn').onclick = () => closeReview(false);

  // ---------- Camera ----------
  function setStatus(t, c) { statusText.textContent = t; statusDot.style.background = c || '#8b949e'; }

  async function listLenses() {
    try {
      const devs = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
      lensSel.innerHTML = '';
      devs.forEach((d, i) => {
        const o = document.createElement('option');
        o.value = d.deviceId;
        o.textContent = d.label ? d.label.replace(/ Camera.*$/i, '').slice(0, 22) : `Camera ${i + 1}`;
        lensSel.append(o);
      });
      lensSel.style.display = devs.length > 1 ? 'block' : 'none';
      if (currentDeviceId) lensSel.value = currentDeviceId;
    } catch (e) {}
  }
  lensSel.onchange = () => { currentDeviceId = lensSel.value; startCamera(); };

  function setupZoom() {
    zoomWrap.style.display = 'none';
    if (!track || !track.getCapabilities) return;
    const cap = track.getCapabilities();
    if (cap.zoom && cap.zoom.max > cap.zoom.min) {
      zoomSlider.min = cap.zoom.min; zoomSlider.max = Math.min(cap.zoom.max, 10);
      zoomSlider.step = cap.zoom.step || 0.1;
      const cur = track.getSettings().zoom || cap.zoom.min;
      zoomSlider.value = cur; zoomVal.textContent = (+cur).toFixed(1) + 'x';
      zoomWrap.style.display = 'flex';
    }
  }
  zoomSlider.oninput = () => {
    const v = +zoomSlider.value;
    zoomVal.textContent = v.toFixed(1) + 'x';
    if (track) track.applyConstraints({ advanced: [{ zoom: v }] }).catch(() => {});
  };

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    const base = currentDeviceId ? { deviceId: { exact: currentDeviceId } } : { facingMode };
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { ...base, width: { ideal: 1920 }, height: { ideal: 1920 } }, audio: false
      });
      track = stream.getVideoTracks()[0];
      currentDeviceId = track.getSettings().deviceId || currentDeviceId;
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      await video.play().catch(() => {});
      setupZoom(); listLenses();
    } catch (e) {
      setStatus('Camera unavailable: ' + e.message, '#f85149');
      throw e;
    }
  }
  flipBtn.onclick = async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    currentDeviceId = null; sel = null;
    await startCamera();
  };

  function computeView() {
    const sw = stage.clientWidth, sh = stage.clientHeight;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    if (overlay.width !== Math.round(sw * dpr) || overlay.height !== Math.round(sh * dpr)) {
      overlay.width = Math.round(sw * dpr); overlay.height = Math.round(sh * dpr);
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const scale = Math.max(sw / vw, sh / vh);
    return { sw, sh, scale, x0: (vw - sw / scale) / 2, y0: (vh - sh / scale) / 2 };
  }

  // ---------- Tap to choose subject ----------
  function iou(a, b) {
    const ax2 = a[0] + a[2], ay2 = a[1] + a[3], bx2 = b[0] + b[2], by2 = b[1] + b[3];
    const ix = Math.max(0, Math.min(ax2, bx2) - Math.max(a[0], b[0]));
    const iy = Math.max(0, Math.min(ay2, by2) - Math.max(a[1], b[1]));
    const inter = ix * iy;
    return inter / (a[2] * a[3] + b[2] * b[3] - inter || 1);
  }
  video.addEventListener('click', e => {
    if (!view || !lastPreds.length) { sel = null; return; }
    const r = video.getBoundingClientRect();
    const vx = (e.clientX - r.left) / view.scale + view.x0;
    const vy = (e.clientY - r.top) / view.scale + view.y0;
    let hit = null;
    for (const p of lastPreds) {
      const [x, y, w, h] = p.bbox;
      if (vx >= x && vx <= x + w && vy >= y && vy <= y + h) {
        if (!hit || w * h < hit.bbox[2] * hit.bbox[3]) hit = p;   // smallest box wins
      }
    }
    if (hit) {
      sel = { class: hit.class, bbox: hit.bbox, lastSeen: Date.now() };
      buzz(20); lockSound();
      setStatus(`Tracking ${hit.class} — tap elsewhere to switch`, '#a371f7');
    } else sel = null;   // tapped empty space → back to auto
  });

  function pickSubject(preds) {
    // selected subject first
    if (sel) {
      let best = null, bi = 0;
      for (const p of preds) {
        if (p.class !== sel.class || p.score < 0.3) continue;
        const v = iou(p.bbox, sel.bbox);
        if (v > bi) { bi = v; best = p; }
      }
      if (best && bi > 0.1) { sel.bbox = best.bbox; sel.lastSeen = Date.now(); return { pred: best, selected: true }; }
      if (Date.now() - sel.lastSeen > 2500) sel = null;   // lost too long → auto
      else return null;                                    // briefly lost — wait
    }
    let best = null, bv = 0;
    for (const p of preds) {
      if (p.score < MIN_SCORE) continue;
      const v = p.bbox[2] * p.bbox[3] * p.score;
      if (v > bv) { bv = v; best = p; }
    }
    return best ? { pred: best, selected: false } : null;
  }

  // ---------- Pro composition rules ----------
  // For people/animals the EYES go on an intersection (top third), not the body center
  const EYE_CLASSES = new Set(['person', 'cat', 'dog', 'bird', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe']);
  function anchorFor(pred) {           // in video coords
    const [x, y, w, h] = pred.bbox;
    if (EYE_CLASSES.has(pred.class)) return { x: x + w / 2, y: y + h * 0.12, eye: true };
    return { x: x + w / 2, y: y + h / 2, eye: false };
  }
  // Motion tracking for lead room (space in front of a moving subject)
  let motionHist = [];
  function trackMotion(x) {
    const now = performance.now();
    motionHist.push({ x, t: now });
    motionHist = motionHist.filter(m => now - m.t < 800);
    if (motionHist.length < 4) return 0;
    const a = motionHist[0], b = motionHist[motionHist.length - 1];
    return (b.x - a.x) / ((b.t - a.t) / 1000 || 1);   // px/sec, + = moving right
  }
  // Which intersections are valid targets for this subject
  function candidatePoints(w, h, eye, vx) {
    let pts = powerPoints(w, h);
    if (eye) pts = pts.filter(p => p.y < h / 2);       // eyes belong on the TOP third line
    if (Math.abs(vx) > 45) {                           // moving → leave lead room in front
      const wantX = vx > 0 ? w / 3 : 2 * w / 3;        // moving right → subject left, space right
      const f = pts.filter(p => Math.abs(p.x - wantX) < 1);
      if (f.length) pts = f;
    }
    return pts;
  }

  // ---------- Drawing ----------
  function powerPoints(w, h) {
    return [
      { x: w / 3, y: h / 3 }, { x: 2 * w / 3, y: h / 3 },
      { x: w / 3, y: 2 * h / 3 }, { x: 2 * w / 3, y: 2 * h / 3 }
    ];
  }
  function drawGrid(w, h) {
    if (settings.grid) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.setLineDash([8, 8]);
      [w / 3, 2 * w / 3].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); });
      [h / 3, 2 * h / 3].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); });
      ctx.setLineDash([]);
    }
    powerPoints(w, h).forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    });
  }
  // Big pulsing arrow from subject toward target
  function drawArrow(cx, cy, tx, ty) {
    const dx = tx - cx, dy = ty - cy;
    const dist = Math.hypot(dx, dy);
    if (dist < 30) return;
    const ux = dx / dist, uy = dy / dist;
    const pulse = 0.55 + 0.45 * Math.sin(performance.now() / 180);
    const startD = 26, endD = Math.min(dist - 22, 26 + 46 * pulse);
    const sx = cx + ux * startD, sy = cy + uy * startD;
    const ex = cx + ux * endD, ey = cy + uy * endD;
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = '#ffd33d'; ctx.fillStyle = '#ffd33d';
    ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    const ah = 16, ang = Math.atan2(uy, ux);
    ctx.beginPath();
    ctx.moveTo(ex + Math.cos(ang) * ah, ey + Math.sin(ang) * ah);
    ctx.lineTo(ex + Math.cos(ang + 2.5) * ah, ey + Math.sin(ang + 2.5) * ah);
    ctx.lineTo(ex + Math.cos(ang - 2.5) * ah, ey + Math.sin(ang - 2.5) * ah);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  function drawProgressRing(x, y, frac) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = '#3fb950';
    ctx.beginPath(); ctx.arc(x, y, 22, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.min(frac, 1));
    ctx.stroke();
    ctx.restore();
  }

  function doFlash() { flash.style.opacity = '0.9'; setTimeout(() => flash.style.opacity = '0', 120); }

  function composeThirds(src, cx, cy, eye, vx) {
    const W = src.width, H = src.height, z = 1.25;
    const cw = Math.round(W / z), ch = Math.round(H / z);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    let cands = [[1/3, 1/3], [2/3, 1/3], [1/3, 2/3], [2/3, 2/3]];
    if (eye) cands = cands.filter(c => c[1] < 0.5);          // eyes on top intersections
    if (Math.abs(vx || 0) > 45) {                            // lead room in front of motion
      const wantFx = vx > 0 ? 1/3 : 2/3;
      const f = cands.filter(c => c[0] === wantFx);
      if (f.length) cands = f;
    }
    let best = null;
    for (const [fx, fy] of cands) {
      const x0 = clamp(cx - fx * cw, 0, W - cw);
      const y0 = clamp(cy - fy * ch, 0, H - ch);
      const score = Math.hypot((cx - x0) / cw - fx, (cy - y0) / ch - fy);
      if (!best || score < best.score) best = { x0, y0, score };
    }
    const out = document.createElement('canvas');
    out.width = cw; out.height = ch;
    out.getContext('2d').drawImage(src, best.x0, best.y0, cw, ch, 0, 0, cw, ch);
    return out;
  }

  async function capture(label) {
    const v = view || computeView();
    if (!v || reviewing) return;
    const iw = Math.round(v.sw / v.scale), ih = Math.round(v.sh / v.scale);
    let c = document.createElement('canvas');
    c.width = iw; c.height = ih;
    c.getContext('2d').drawImage(video, v.x0, v.y0, iw, ih, 0, 0, iw, ih);
    if (lastSubject && Date.now() - lastSubject.t < 1200) {
      c = composeThirds(c, lastSubject.cxImg, lastSubject.cyImg, lastSubject.eye, lastSubject.vx);
    }
    doFlash(); shutterSound(); buzz([40, 60, 40]);
    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.92));
    const photo = { id: Date.now(), blob, label: label || '' };
    if (settings.review) openReview(photo);
    else {
      try { await dbPut(photo); } catch (e) {}
      addToGallery(photo);
      lastCapture = Date.now();
    }
    stableCount = 0;
  }

  async function runCountdownAndCapture(label) {
    countingDown = true;
    for (let n = settings.countdown; n >= 1; n--) {
      countdownEl.textContent = n; countdownEl.style.opacity = '1';
      beep(600, 0.06, 0.1);
      await new Promise(r => setTimeout(r, 500));
    }
    countdownEl.style.opacity = '0';
    await capture(label);
    countingDown = false;
  }

  // ---------- Main loop ----------
  async function loop() {
    if (video.readyState >= 2 && model && video.videoWidth && !reviewing) {
      view = computeView();
      if (view) {
        const { sw, sh, scale, x0, y0 } = view;
        ctx.clearRect(0, 0, sw, sh);
        drawGrid(sw, sh);

        try { lastPreds = await model.detect(video); } catch (e) { lastPreds = []; }
        const res = pickSubject(lastPreds);

        if (res) {
          const { pred: subject, selected } = res;
          const [vbx, vby, vbw, vbh] = subject.bbox;
          const bx = (vbx - x0) * scale, by = (vby - y0) * scale;
          const bw = vbw * scale, bh = vbh * scale;
          const cx = bx + bw / 2, cy = by + bh / 2;
          // Anchor: eyes for people/animals, center for objects
          const anc = anchorFor(subject);
          const ax = (anc.x - x0) * scale, ay = (anc.y - y0) * scale;
          const vxMotion = trackMotion(ax);
          lastSubject = { cxImg: anc.x - x0, cyImg: anc.y - y0, eye: anc.eye, vx: vxMotion, t: Date.now() };

          const pts = candidatePoints(sw, sh, anc.eye, vxMotion);
          let nearest = pts[0], nd = Infinity;
          for (const p of pts) { const d = Math.hypot(ax - p.x, ay - p.y); if (d < nd) { nd = d; nearest = p; } }
          const aligned = nd <= ALIGN_RADIUS * Math.hypot(sw, sh);

          const boxColor = aligned ? '#3fb950' : (selected ? '#a371f7' : '#2f81f7');
          ctx.strokeStyle = boxColor; ctx.lineWidth = 3;
          ctx.strokeRect(bx, by, bw, bh);
          ctx.fillStyle = boxColor;
          // Anchor marker: crosshair on the eyes (or center for objects)
          ctx.beginPath(); ctx.arc(ax, ay, 6, 0, Math.PI * 2); ctx.fill();
          if (anc.eye) {
            ctx.strokeStyle = boxColor; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ax - 14, ay); ctx.lineTo(ax + 14, ay);
            ctx.moveTo(ax, ay - 14); ctx.lineTo(ax, ay + 14); ctx.stroke();
          }
          ctx.font = 'bold 15px sans-serif';
          const tag = (selected ? '📌 ' : '') + subject.class + (anc.eye ? ' 👁' : '');
          ctx.fillText(tag, bx + 4, Math.max(64, by - 8));

          if (aligned) {
            if (!wasAligned) { lockSound(); buzz(15); }
            stableCount++;
            drawProgressRing(nearest.x, nearest.y, stableCount / STABLE_FRAMES);
            const cooling = Date.now() - lastCapture < settings.cooldown * 1000;
            if (cooling) setStatus(`Nice! Pausing between shots…`, '#d29922');
            else if (autoCapture && !countingDown && stableCount >= STABLE_FRAMES) {
              setStatus(`Capturing ${subject.class}!`, '#3fb950');
              runCountdownAndCapture(subject.class);
            } else setStatus(`${anc.eye ? 'Eyes locked on the third' : `Locked on ${subject.class}`} — hold steady`, '#3fb950');
          } else {
            stableCount = 0;
            drawArrow(ax, ay, nearest.x, nearest.y);
            ctx.beginPath(); ctx.arc(nearest.x, nearest.y, 14, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd33d'; ctx.lineWidth = 3; ctx.stroke();
            setStatus(`${selected ? 'Tracking' : 'Found'} ${subject.class} — follow the arrow`, selected ? '#a371f7' : '#2f81f7');
          }
          wasAligned = aligned;
        } else {
          stableCount = 0; wasAligned = false;
          setStatus(sel ? `Looking for your ${sel.class}…` : 'Looking for a subject… (tap one to choose)');
        }
      }
    }
    requestAnimationFrame(loop);
  }

  // ---------- Controls ----------
  autoBtn.onclick = () => {
    autoCapture = !autoCapture;
    autoBtn.textContent = autoCapture ? 'AUTO ON' : 'AUTO OFF';
    autoBtn.classList.toggle('off', !autoCapture);
  };
  shutterBtn.onclick = () => capture('manual');

  // ---------- Boot ----------
  try {
    (await dbAll()).forEach(p => addToGallery(p, false));
    const first = gallery.querySelector('img');
    if (first) galThumb.style.backgroundImage = `url(${first.src})`;
  } catch (e) {}
  try {
    setStatus('Requesting camera…');
    await startCamera();
    setStatus('Loading AI model…');
    model = await cocoSsd.load();
    setStatus('Ready — point at a subject', '#3fb950');
    loop();
  } catch (e) { console.error(e); }
})();
</script>
</body>
</html>
