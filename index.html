<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thirds Rule Camera</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --accent: #2f81f7; --good: #3fb950;
    --warn: #d29922; --text: #e6edf3; --dim: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 16px; gap: 12px;
  }
  h1 { font-size: 1.2rem; font-weight: 600; }
  h1 span { color: var(--accent); }
  #stage {
    position: relative; width: min(960px, 100%);
    border-radius: 12px; overflow: hidden; background: #000;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  video { width: 100%; display: block; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #flash {
    position: absolute; inset: 0; background: #fff; opacity: 0;
    pointer-events: none; transition: opacity .35s ease;
  }
  #status {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border-radius: 10px; padding: 10px 16px;
    width: min(960px, 100%); font-size: .95rem;
  }
  #statusDot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button {
    background: var(--panel); color: var(--text); border: 1px solid #30363d;
    padding: 10px 18px; border-radius: 8px; font-size: .95rem; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .4; cursor: default; }
  #gallery {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    width: min(960px, 100%);
  }
  #gallery figure {
    background: var(--panel); border-radius: 8px; padding: 6px;
    display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  #gallery img { width: 180px; border-radius: 6px; display: block; }
  #gallery a { color: var(--accent); font-size: .8rem; text-decoration: none; }
  #countdown {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 6rem; font-weight: 700; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,.8);
    pointer-events: none; opacity: 0;
  }
</style>
</head>
<body>
<h1>📷 Thirds Rule Camera <span>· AI auto-capture</span></h1>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="countdown"></div>
  <div id="flash"></div>
</div>

<div id="status"><div id="statusDot"></div><div id="statusText">Loading AI model…</div></div>

<div class="controls">
  <button id="autoBtn" class="primary">Auto-capture: ON</button>
  <button id="shutterBtn">Manual shutter</button>
  <button id="flipBtn">Flip camera</button>
</div>

<div id="gallery"></div>

<script>
(async () => {
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const flash = document.getElementById('flash');
  const countdownEl = document.getElementById('countdown');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const gallery = document.getElementById('gallery');
  const autoBtn = document.getElementById('autoBtn');
  const shutterBtn = document.getElementById('shutterBtn');
  const flipBtn = document.getElementById('flipBtn');

  // --- Tunables ---
  const ALIGN_RADIUS = 0.07;      // fraction of frame diagonal counted as "aligned"
  const STABLE_FRAMES = 12;       // consecutive aligned frames before capture
  const COOLDOWN_MS = 4000;       // wait after a capture
  const MIN_SCORE = 0.45;         // detection confidence floor
  const COUNTDOWN_FROM = 2;       // brief countdown before snap

  let autoCapture = true;
  let facingMode = 'environment';
  let model = null;
  let stream = null;
  let stableCount = 0;
  let lastCapture = 0;
  let countingDown = false;

  function setStatus(text, color) {
    statusText.textContent = text;
    statusDot.style.background = color || 'var(--dim)';
  }

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
    } catch (e) {
      setStatus('Camera access denied or unavailable: ' + e.message, '#f85149');
      throw e;
    }
  }

  function powerPoints(w, h) {
    return [
      { x: w / 3, y: h / 3 }, { x: 2 * w / 3, y: h / 3 },
      { x: w / 3, y: 2 * h / 3 }, { x: 2 * w / 3, y: 2 * h / 3 }
    ];
  }

  function drawGrid(w, h) {
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 8]);
    [w / 3, 2 * w / 3].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); });
    [h / 3, 2 * h / 3].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); });
    ctx.setLineDash([]);
    powerPoints(w, h).forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    });
  }

  function pickSubject(predictions) {
    // Most prominent = largest area weighted by confidence
    let best = null, bestVal = 0;
    for (const p of predictions) {
      if (p.score < MIN_SCORE) continue;
      const area = p.bbox[2] * p.bbox[3];
      const val = area * p.score;
      if (val > bestVal) { bestVal = val; best = p; }
    }
    return best;
  }

  function doFlash() {
    flash.style.opacity = '0.9';
    setTimeout(() => flash.style.opacity = '0', 120);
  }

  function capture(label) {
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    doFlash();
    const url = c.toDataURL('image/jpeg', 0.92);
    const fig = document.createElement('figure');
    const img = document.createElement('img');
    img.src = url;
    const a = document.createElement('a');
    a.href = url;
    a.download = `thirds-${Date.now()}.jpg`;
    a.textContent = '⬇ Download' + (label ? ` · ${label}` : '');
    fig.append(img, a);
    gallery.prepend(fig);
    lastCapture = Date.now();
    stableCount = 0;
  }

  async function runCountdownAndCapture(label) {
    countingDown = true;
    for (let n = COUNTDOWN_FROM; n >= 1; n--) {
      countdownEl.textContent = n;
      countdownEl.style.opacity = '1';
      await new Promise(r => setTimeout(r, 500));
    }
    countdownEl.style.opacity = '0';
    capture(label);
    countingDown = false;
  }

  function guidance(dx, dy) {
    const dirs = [];
    if (Math.abs(dx) > 4) dirs.push(dx > 0 ? '→ right' : '← left');
    if (Math.abs(dy) > 4) dirs.push(dy > 0 ? '↓ down' : '↑ up');
    return dirs.length ? 'Move subject ' + dirs.join(' and ') : 'Hold still…';
  }

  async function loop() {
    if (video.readyState >= 2 && model) {
      const w = overlay.width, h = overlay.height;
      ctx.clearRect(0, 0, w, h);
      drawGrid(w, h);

      const predictions = await model.detect(video);
      const subject = pickSubject(predictions);

      if (subject) {
        const [bx, by, bw, bh] = subject.bbox;
        const cx = bx + bw / 2, cy = by + bh / 2;

        // Nearest power point
        const pts = powerPoints(w, h);
        let nearest = pts[0], nd = Infinity;
        for (const p of pts) {
          const d = Math.hypot(cx - p.x, cy - p.y);
          if (d < nd) { nd = d; nearest = p; }
        }
        const threshold = ALIGN_RADIUS * Math.hypot(w, h);
        const aligned = nd <= threshold;

        // Draw bounding box + center
        ctx.strokeStyle = aligned ? 'var(--good)' : 'rgba(47,129,247,0.9)';
        ctx.strokeStyle = aligned ? '#3fb950' : '#2f81f7';
        ctx.lineWidth = 3;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
        ctx.font = '16px sans-serif';
        ctx.fillText(`${subject.class} ${(subject.score * 100).toFixed(0)}%`, bx + 4, by - 8);

        // Line to nearest power point
        ctx.setLineDash([4, 6]);
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(nearest.x, nearest.y); ctx.stroke();
        ctx.setLineDash([]);

        // Highlight target point
        ctx.beginPath(); ctx.arc(nearest.x, nearest.y, 14, 0, Math.PI * 2);
        ctx.strokeStyle = aligned ? '#3fb950' : '#d29922';
        ctx.lineWidth = 3; ctx.stroke();

        const coolingDown = Date.now() - lastCapture < COOLDOWN_MS;

        if (aligned) {
          stableCount++;
          if (coolingDown) {
            setStatus(`${subject.class} aligned — cooling down`, '#d29922');
          } else if (autoCapture && !countingDown && stableCount >= STABLE_FRAMES) {
            setStatus(`Capturing ${subject.class}!`, '#3fb950');
            runCountdownAndCapture(subject.class);
          } else {
            setStatus(`${subject.class} on power point — hold still (${Math.min(stableCount, STABLE_FRAMES)}/${STABLE_FRAMES})`, '#3fb950');
          }
        } else {
          stableCount = 0;
          setStatus(`${subject.class} detected — ${guidance(nearest.x - cx, nearest.y - cy)}`, '#2f81f7');
        }
      } else {
        stableCount = 0;
        setStatus('Looking for a subject…', 'var(--dim)');
      }
    }
    requestAnimationFrame(loop);
  }

  // --- Controls ---
  autoBtn.onclick = () => {
    autoCapture = !autoCapture;
    autoBtn.textContent = `Auto-capture: ${autoCapture ? 'ON' : 'OFF'}`;
    autoBtn.classList.toggle('primary', autoCapture);
  };
  shutterBtn.onclick = () => capture('manual');
  flipBtn.onclick = async () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  };

  // --- Boot ---
  try {
    setStatus('Requesting camera…');
    await startCamera();
    setStatus('Loading AI model (first load may take a few seconds)…');
    model = await cocoSsd.load();
    setStatus('Ready — point at a subject', '#3fb950');
    loop();
  } catch (e) {
    console.error(e);
  }
})();
</script>
</body>
</html>
